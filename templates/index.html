<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistente Legal IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f1117;
            --surface: #181c27;
            --surface2: #1e2333;
            --bubble-user: #1e2a1e;
            --bubble-ai: #1c2030;
            --border: #2a2f3e;
            --accent: #c9a84c;
            --accent-dim: #a8883a;
            --text: #e8e4da;
            --muted: #7a7f91;
            --green: #4caf82;
            --green-dim: #3a8f68;
            --red: #c0504a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Source Sans 3', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 80px;
        }

        header { text-align: center; margin-bottom: 32px; }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--accent);
        }
        header p {
            color: var(--muted);
            margin-top: 6px;
            font-size: 0.88rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .layout {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            align-items: flex-start;
        }

        /* ── PANEL CONVERSACIÓN ── */
        .main-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 12px; }

        /* Hilo de conversación */
        .chat-thread {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 62vh;
            overflow-y: auto;
            padding: 4px 2px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        /* Burbuja de pregunta (usuario) */
        .bubble-user {
            align-self: flex-end;
            background: var(--bubble-user);
            border: 1px solid #2d3d2d;
            border-radius: 14px 14px 4px 14px;
            padding: 12px 16px;
            max-width: 80%;
            font-size: 0.97rem;
            line-height: 1.5;
            color: #b8d4b8;
        }

        /* Burbuja de respuesta (IA) */
        .bubble-ai {
            align-self: flex-start;
            background: var(--bubble-ai);
            border: 1px solid var(--border);
            border-radius: 14px 14px 14px 4px;
            padding: 14px 16px;
            max-width: 92%;
            font-size: 0.95rem;
            line-height: 1.75;
            white-space: pre-wrap;
        }

        .bubble-ai-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }

        /* Botones de acción bajo cada respuesta */
        .bubble-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        /* Indicador de carga dentro del hilo */
        .bubble-loading {
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.88rem;
            padding: 10px 4px;
        }

        .dot-spinner {
            display: flex; gap: 4px;
        }
        .dot-spinner span {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1s infinite;
        }
        .dot-spinner span:nth-child(2) { animation-delay: 0.15s; }
        .dot-spinner span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-5px); opacity: 1; }
        }

        /* Barra de entrada */
        .input-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
        }

        .input-row { display: flex; gap: 10px; }

        input[type="text"] {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 1rem;
            padding: 11px 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        input[type="text"]::placeholder { color: var(--muted); }

        /* Botones */
        .btn {
            border: none; border-radius: 8px; cursor: pointer;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.88rem; font-weight: 600;
            padding: 10px 18px;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { background: var(--border) !important; color: var(--muted) !important; cursor: not-allowed; }

        .btn-primary  { background: var(--accent); color: #0f1117; }
        .btn-primary:hover  { background: var(--accent-dim); }

        .btn-outline  { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-outline:hover  { background: var(--accent); color: #0f1117; }

        .btn-green    { background: var(--green); color: #0f1117; }
        .btn-green:hover    { background: var(--green-dim); }

        .btn-xs { font-size: 0.78rem; padding: 6px 14px; min-width: 90px; text-align: center; }

        .btn-outline-green { background: transparent; border: 1px solid var(--green); color: var(--green); }
        .btn-outline-green:hover { background: var(--green); color: #0f1117; }

        .btn-icon-red { background: transparent; border: none; color: var(--red); font-size: 0.9rem; cursor: pointer; padding: 3px 7px; border-radius: 4px; }
        .btn-icon-red:hover { background: rgba(192,80,74,0.15); }

        /* ── PANEL HISTORIAL ── */
        .history-panel { width: 280px; flex-shrink: 0; }

        .history-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            position: sticky;
            top: 24px;
        }

        .history-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px;
        }
        .history-title {
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem; color: var(--accent);
        }
        .history-count {
            background: var(--accent); color: #0f1117;
            font-size: 0.72rem; font-weight: 700;
            border-radius: 999px; padding: 2px 8px;
        }

        #histList {
            max-height: 300px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .history-empty { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 16px 0; }
        .history-list  { display: flex; flex-direction: column; gap: 7px; }

        .history-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 8px 10px;
            display: flex; justify-content: space-between;
            align-items: flex-start; gap: 6px;
        }
        .history-item-text {
            font-size: 0.82rem; color: var(--text); line-height: 1.35;
            overflow: hidden; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }

        .history-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

        .history-actions { display: flex; flex-direction: column; gap: 6px; }

        .report-status { font-size: 0.8rem; color: var(--muted); text-align: center; margin-top: 8px; min-height: 16px; }
        .report-spinner {
            display: none; width: 14px; height: 14px;
            border: 2px solid var(--border); border-top-color: var(--green);
            border-radius: 50%; animation: spin 0.7s linear infinite;
            margin: 5px auto 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>Asistente Legal IA</h1>
    <p>Consulta sobre legislación española</p>
</header>

<div class="layout">

    <!-- ── PANEL CONVERSACIÓN ── -->
    <div class="main-panel">

        <!-- Hilo de mensajes -->
        <div class="chat-thread" id="chatThread"></div>

        <!-- Barra de entrada (siempre abajo) -->
        <div class="input-card">
            <div class="input-row">
                <input type="text" id="question" placeholder="Escribe tu pregunta legal…" autocomplete="off">
                <button class="btn btn-primary" id="askBtn" onclick="sendQuestion()">Preguntar</button>
            </div>
        </div>

    </div>

    <!-- ── PANEL HISTORIAL ── -->
    <div class="history-panel">
        <div class="history-card">
            <div class="history-header">
                <span class="history-title">Historial</span>
                <span class="history-count" id="histCount">0</span>
            </div>

            <div id="histList">
                <div class="history-empty">Sin consultas guardadas</div>
            </div>

            <hr class="history-divider">

            <div class="history-actions">
                <button class="btn btn-green" id="reportBtn" onclick="generarInforme()" disabled>
                    📄 Generar informe final
                </button>
                <button class="btn btn-outline btn-xs" onclick="limpiarHistorial()">
                    🗑 Vaciar historial
                </button>
            </div>

            <div class="report-status" id="reportStatus"></div>
            <div class="report-spinner" id="reportSpinner"></div>
        </div>
    </div>

</div>

<script>
let currentQuestion = "";
let currentAnswer   = "";
let lastSaveBtnId   = null;   // id del botón guardar de la última burbuja

// ── Enviar pregunta ───────────────────────────────────────────
async function sendQuestion() {
    const q = document.getElementById("question").value.trim();
    if (!q) return;

    currentQuestion = q;
    document.getElementById("question").value = "";
    document.getElementById("askBtn").disabled = true;

    // Burbuja usuario
    appendBubbleUser(q);

    // Indicador de carga
    const loadId = "load-" + Date.now();
    appendLoading(loadId);

    try {
        const res  = await fetch("/ask", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "question=" + encodeURIComponent(q)
        });
        const data = await res.json();
        currentAnswer = data.answer;

        removeLoading(loadId);
        const btnId = appendBubbleAI(q, data.answer);
        lastSaveBtnId = btnId;

    } catch (e) {
        removeLoading(loadId);
        appendBubbleAI(q, "Error al conectar con el servidor.");
    } finally {
        document.getElementById("askBtn").disabled = false;
        document.getElementById("question").focus();
    }
}

// ── Añadir burbuja de usuario ─────────────────────────────────
function appendBubbleUser(text) {
    const thread = document.getElementById("chatThread");
    const div = document.createElement("div");
    div.className = "bubble-user";
    div.textContent = text;
    thread.appendChild(div);
    scrollToBottom();
}

// ── Añadir burbuja de IA con botones ─────────────────────────
function appendBubbleAI(question, answer) {
    const thread = document.getElementById("chatThread");
    const btnId  = "save-" + Date.now();

    const div = document.createElement("div");
    div.className = "bubble-ai";

    // Construir el div manualmente para evitar problemas con caracteres especiales
    const label = document.createElement("div");
    label.className = "bubble-ai-label";
    label.textContent = "Asistente Legal";

    const text = document.createElement("div");
    text.textContent = answer;

    const actions = document.createElement("div");
    actions.className = "bubble-actions";

    // Botón PDF (formulario)
    const form = document.createElement("form");
    form.method = "POST";
    form.action = "/generate_pdf";
    form.style.display = "inline";
    const inpQ = document.createElement("input");
    inpQ.type = "hidden"; inpQ.name = "question"; inpQ.value = question;
    const inpA = document.createElement("input");
    inpA.type = "hidden"; inpA.name = "answer"; inpA.value = answer;
    const pdfBtn = document.createElement("button");
    pdfBtn.type = "submit";
    pdfBtn.className = "btn btn-outline btn-xs";
    pdfBtn.textContent = "⬇ PDF";
    form.appendChild(inpQ);
    form.appendChild(inpA);
    form.appendChild(pdfBtn);

    // Botón Guardar (data attributes para evitar escaping)
    const saveBtn = document.createElement("button");
    saveBtn.id = btnId;
    saveBtn.className = "btn btn-outline-green btn-xs";
    saveBtn.textContent = "💾 Guardar";
    saveBtn.dataset.question = question;
    saveBtn.dataset.answer   = answer;
    saveBtn.addEventListener("click", function() {
        guardarEnHistorial(this);
    });

    actions.appendChild(form);
    actions.appendChild(saveBtn);

    div.appendChild(label);
    div.appendChild(text);
    div.appendChild(actions);

    thread.appendChild(div);
    scrollToBottom();
    return btnId;
}

// ── Indicador de carga ────────────────────────────────────────
function appendLoading(id) {
    const thread = document.getElementById("chatThread");
    const div = document.createElement("div");
    div.className = "bubble-loading";
    div.id = id;
    div.innerHTML = `
        <div class="dot-spinner">
            <span></span><span></span><span></span>
        </div>
        Consultando documentos…
    `;
    thread.appendChild(div);
    scrollToBottom();
}

function removeLoading(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

// ── Guardar en historial ──────────────────────────────────────
async function guardarEnHistorial(btn) {
    if (!btn || btn.disabled) return;
    btn.disabled = true;
    btn.textContent = "✔ Guardado";

    const question = btn.dataset.question;
    const answer   = btn.dataset.answer;

    await fetch("/save_to_history", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question, answer })
    });
    actualizarHistorial();
}

// ── Eliminar del historial ────────────────────────────────────
async function eliminarEntrada(idx) {
    await fetch("/remove_from_history", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ index: idx })
    });
    actualizarHistorial();
}

// ── Vaciar historial ──────────────────────────────────────────
async function limpiarHistorial() {
    await fetch("/clear_history", { method: "POST" });
    actualizarHistorial();
}

// ── Actualizar panel historial ────────────────────────────────
async function actualizarHistorial() {
    const res  = await fetch("/get_history");
    const data = await res.json();

    const count = data.length;
    document.getElementById("histCount").textContent = count;
    document.getElementById("reportBtn").disabled    = count === 0;

    const list = document.getElementById("histList");

    if (count === 0) {
        list.innerHTML = '<div class="history-empty">Sin consultas guardadas</div>';
        return;
    }

    list.innerHTML = '<div class="history-list" id="histItems"></div>';
    const items = document.getElementById("histItems");

    data.forEach((item, i) => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
            <div class="history-item-text" title="${escHtml(item.question)}">${escHtml(item.question)}</div>
            <button class="btn-icon-red" onclick="eliminarEntrada(${i})" title="Eliminar">✕</button>
        `;
        items.appendChild(div);
    });
}

// ── Generar informe final ─────────────────────────────────────
async function generarInforme() {
    const btn     = document.getElementById("reportBtn");
    const spinner = document.getElementById("reportSpinner");
    const status  = document.getElementById("reportStatus");

    btn.disabled = true;
    spinner.style.display = "block";
    status.textContent = "Redactando con IA…";

    try {
        const res = await fetch("/generate_report", { method: "POST" });

        if (!res.ok) {
            const err = await res.json();
            status.textContent = "Error: " + (err.error || "desconocido");
            return;
        }

        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = "informe_final.pdf";
        a.click();
        URL.revokeObjectURL(url);
        status.textContent = "✔ Descargado.";
    } catch (e) {
        status.textContent = "Error al generar el informe.";
    } finally {
        btn.disabled = false;
        spinner.style.display = "none";
    }
}

// ── Utilidades ────────────────────────────────────────────────
function scrollToBottom() {
    const t = document.getElementById("chatThread");
    t.scrollTop = t.scrollHeight;
}

function escHtml(str) {
    return String(str)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function escAttr(str) {
    return String(str).replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

document.getElementById("question").addEventListener("keydown", e => {
    if (e.key === "Enter") sendQuestion();
});
</script>

</body>
</html>
